<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviveMeBrother — CraftBorn RP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #c41e3a;
            --red-dark: #8b0000;
            --red-glow: #ff2244;
            --black: #0a0a0a;
            --black-2: #111111;
            --black-3: #1a1a1a;
            --black-4: #222222;
            --gold: #ffd700;
            --text: #e8e8e8;
            --text-muted: #888;
            --border: rgba(196,30,58,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--black);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ─── LANGUAGE SELECTOR OVERLAY ─── */
        #lang-overlay {
            position: fixed;
            inset: 0;
            background: var(--black);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 50px;
        }

        .lang-overlay-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 50%, rgba(196,30,58,0.12) 0%, transparent 70%),
                repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(196,30,58,0.04) 60px, rgba(196,30,58,0.04) 61px),
                repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(196,30,58,0.04) 60px, rgba(196,30,58,0.04) 61px);
            pointer-events: none;
        }

        .lang-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            letter-spacing: 0.08em;
            text-align: center;
            line-height: 1;
            position: relative;
        }

        .lang-logo span {
            color: var(--red);
            display: block;
            font-size: 0.45em;
            letter-spacing: 0.3em;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .lang-prompt {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .lang-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            position: relative;
        }

        .lang-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 20px 24px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(196,30,58,0.2);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.25s ease;
            min-width: 110px;
            text-decoration: none;
        }

        .lang-btn:hover {
            background: rgba(196,30,58,0.12);
            border-color: var(--red);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(196,30,58,0.3);
        }

        .lang-btn .flag {
            font-size: 2.4rem;
            line-height: 1;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
        }

        .lang-btn .lang-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            text-transform: uppercase;
            transition: color 0.25s;
        }

        .lang-btn:hover .lang-name { color: var(--text); }

        @media (max-width: 640px) {
            .lang-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .lang-grid .lang-btn:last-child { grid-column: span 2; justify-self: center; }
        }

        /* ─── SCANLINE EFFECT ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
            pointer-events: none;
            z-index: 1000;
        }

        /* ─── NOISE TEXTURE ─── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 999;
            opacity: 0.4;
        }

        /* ─── NAV ─── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            color: var(--red);
        }

        .nav-logo em {
            color: var(--text-muted);
            font-style: normal;
            font-size: 0.7em;
            letter-spacing: 0.2em;
            margin-left: 8px;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 100%;
            height: 1px;
            background: var(--red);
            transition: right 0.25s ease;
        }

        .nav-links a:hover { color: var(--text); }
        .nav-links a:hover::after { right: 0; }

        #lang-switcher {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            background: rgba(196,30,58,0.15);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.1em;
        }

        #lang-switcher:hover {
            background: rgba(196,30,58,0.3);
            color: var(--text);
            border-color: var(--red);
        }

        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .nav-links { display: none; }
        }

        /* ─── HERO ─── */
        #hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 80px 20px 40px;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 40%, rgba(196,30,58,0.18) 0%, transparent 65%),
                radial-gradient(ellipse 40% 30% at 20% 80%, rgba(139,0,0,0.1) 0%, transparent 60%);
        }

        .hero-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(196,30,58,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(196,30,58,0.06) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);
        }

        .hero-content {
            position: relative;
            text-align: center;
            max-width: 900px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(196,30,58,0.15);
            border: 1px solid rgba(196,30,58,0.4);
            border-radius: 2px;
            padding: 6px 16px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: var(--red);
            margin-bottom: 28px;
        }

        .hero-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--red);
            border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.6); }
        }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.5rem, 10vw, 8rem);
            line-height: 0.9;
            letter-spacing: 0.04em;
            margin-bottom: 20px;
        }

        .hero-title .red { color: var(--red); }

        .hero-subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            letter-spacing: 0.25em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .hero-meta {
            display: flex;
            gap: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-meta-item {
            text-align: center;
        }

        .hero-meta-item .label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .hero-meta-item .value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            color: var(--gold);
        }

        .hero-divider {
            width: 1px;
            height: 40px;
            background: var(--border);
            align-self: center;
        }

        /* ─── SECTIONS ─── */
        .section {
            padding: 80px 40px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .section-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: 0.04em;
            line-height: 1;
            margin-bottom: 14px;
        }

        .section-desc {
            color: var(--text-muted);
            font-size: 1.05rem;
            max-width: 580px;
            line-height: 1.7;
            font-weight: 500;
        }

        .sep {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(196,30,58,0.5), transparent);
            margin: 0 40px;
        }

        /* ─── FEATURES GRID ─── */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-top: 50px;
            border: 1px solid var(--border);
        }

        @media (max-width: 1024px) { .features-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .features-grid { grid-template-columns: 1fr; } }

        .feature-item {
            padding: 36px 32px;
            background: var(--black-2);
            border: 1px solid rgba(196,30,58,0.08);
            transition: background 0.25s, border-color 0.25s;
            position: relative;
            overflow: hidden;
        }

        .feature-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .feature-item:hover { background: var(--black-3); border-color: var(--border); }
        .feature-item:hover::before { opacity: 1; }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 16px;
            display: block;
        }

        .feature-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .feature-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.65;
            font-weight: 500;
        }

        .feature-list {
            list-style: none;
            margin-top: 12px;
        }

        .feature-list li {
            color: var(--text-muted);
            font-size: 0.88rem;
            padding: 4px 0;
            padding-left: 14px;
            position: relative;
            font-weight: 500;
        }

        .feature-list li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--red);
            font-size: 0.7em;
            top: 5px;
        }

        /* ─── BUTTONS SECTION ─── */
        .buttons-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 50px;
        }

        @media (max-width: 768px) { .buttons-row { grid-template-columns: 1fr; } }

        .btn-card {
            background: var(--black-2);
            border: 1px solid var(--border);
            padding: 32px 28px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.25s, background 0.25s;
        }

        .btn-card:hover {
            border-color: var(--red);
            background: var(--black-3);
        }

        .btn-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--red);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .btn-card:hover::after { transform: scaleX(1); }

        .btn-key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: var(--red);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0;
            color: white;
            margin-bottom: 18px;
            box-shadow: 0 4px 20px rgba(196,30,58,0.4);
        }

        .btn-card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.08em;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .btn-card-text {
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.6;
            font-weight: 500;
        }

        /* ─── TIER SYSTEM ─── */
        .tiers-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            margin-top: 50px;
        }

        @media (max-width: 1024px) { .tiers-row { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .tiers-row { grid-template-columns: 1fr; } }

        .tier-item {
            background: var(--black-2);
            border: 1px solid rgba(196,30,58,0.1);
            padding: 36px 28px;
            text-align: center;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .tier-item:hover {
            background: var(--black-3);
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(196,30,58,0.15);
        }

        .tier-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            line-height: 1;
            color: rgba(196,30,58,0.15);
            position: absolute;
            top: 10px;
            right: 16px;
            letter-spacing: -0.02em;
        }

        .tier-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(196,30,58,0.15);
            border: 1px solid rgba(196,30,58,0.3);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--red);
            margin-bottom: 16px;
        }

        .tier-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.06em;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .tier-heal {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: var(--red);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .tier-desc {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.6;
            font-weight: 500;
        }

        /* ─── GALLERY ─── */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-top: 50px;
        }

        @media (max-width: 900px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 560px) { .gallery-grid { grid-template-columns: 1fr; } }

        .gallery-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 16/10;
            background: var(--black-2);
            border: 1px solid rgba(196,30,58,0.1);
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, filter 0.3s;
            filter: brightness(0.85) saturate(0.9);
        }

        .gallery-item:hover img {
            transform: scale(1.06);
            filter: brightness(1) saturate(1.1);
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.85) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gallery-item:hover .gallery-overlay { opacity: 1; }

        .gallery-overlay h4 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            color: var(--gold);
            margin-bottom: 4px;
        }

        .gallery-overlay p {
            color: rgba(255,255,255,0.7);
            font-size: 0.82rem;
            font-weight: 500;
        }

        /* ─── HOL
